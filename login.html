<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IcePro Hockey Shop</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body style="padding-top: 0 !important;">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark-mode';
            document.body.classList.remove('dark-mode', 'light-mode');
            document.body.classList.add(savedTheme);
        })();
    </script>

    <!-- Floating Actions -->
    <div class="floating-actions">
        <button id="rtl-toggle" class="action-btn">
            <i class="bi bi-translate"></i>
        </button>
        <button id="theme-toggle" class="action-btn">
            <i class="bi bi-sun-fill"></i>
        </button>
    </div>

    <div class="auth-screen">
        <!-- Form Container -->
        <div class="auth-form-side reveal-up">
            <div class="text-center mb-5">
                <a href="index.html" class="nav-logo justify-content-center mb-4">
                    <i class="bi bi-lightning-charge-fill accent-glow"></i>
                    ICEPRO
                </a>
                <h3 class="mb-2">Login to Account</h3>
                <p class="text-secondary small">Enter your credentials to continue.</p>
            </div>

            <form class="w-100">
                <div class="form-group">
                    <label class="small text-secondary mb-2 uppercase fw-bold letter-spacing-1">Email Address</label>
                    <input type="email" class="form-control" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <label class="small text-secondary mb-2 uppercase fw-bold letter-spacing-1">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control pe-5" placeholder="Password" required>
                        <button type="button" class="password-toggle-btn">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4 d-flex align-items-center justify-content-between w-100">
                    <div class="d-flex align-items-center gap-2">
                        <input type="checkbox" id="remember" class="form-check-input">
                        <label for="remember" class="small text-secondary">Remember me</label>
                    </div>
                    <a href="#" class="small text-accent fw-bold ms-auto">Forgot Password?</a>
                </div>

                <div class="text-center">
                    <button class="btn btn-primary w-100 py-3 mb-4">Login</button>
                </div>

                <div class="divider mb-4">
                    <span>or continue with</span>
                </div>

                <div class="social-login-grid">
                    <button class="btn btn-outline btn-sm py-2" type="button">
                        <i class="bi bi-google me-2"></i> Google
                    </button>
                    <button class="btn btn-outline btn-sm py-2" type="button">
                        <i class="bi bi-apple me-2"></i> Apple
                    </button>
                </div>

                <p class="text-center small text-secondary mt-5">
                    New to IcePro? <a href="signup.html" class="text-accent fw-bold">Create an account</a>
                </p>
            </form>

            <div class="mt-5 text-center">
                <p class="small text-secondary">&copy; 2026 IcePro. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/password-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>

</html>
