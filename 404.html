<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | IcePro</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="dark-mode" style="height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding-top: 0 !important;">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark-mode';
            document.body.classList.remove('dark-mode', 'light-mode');
            document.body.classList.add(savedTheme);
        })();
    </script>

    <div class="container">
        <h1 style="font-size: 8rem; color: var(--accent); line-height: 1;" class="mb-4">404</h1>
        <h2 class="mb-4">OUT OF BOUNDS</h2>
        <p class="text-secondary mb-5" style="max-width: 500px; margin: 0 auto;">The page you are looking for has been moved or doesn't exist. Let's get you back in the game.</p>
        <a href="index.html" class="btn btn-primary px-5">Back to Home</a>
    </div>

    <script src="assets/js/rtl-toggle.js"></script>
</body>
</html>
