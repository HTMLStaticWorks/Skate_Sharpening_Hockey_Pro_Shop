<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | IcePro Hockey Shop</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark-mode';
            document.body.classList.remove('dark-mode', 'light-mode');
            document.body.classList.add(savedTheme);
        })();
    </script>

    <!-- Floating Actions -->
    <div class="floating-actions">
        <button id="rtl-toggle" class="action-btn">
            <i class="bi bi-translate"></i>
        </button>
        <button id="theme-toggle" class="action-btn">
            <i class="bi bi-sun-fill"></i>
        </button>
    </div>

    <div class="auth-screen">
        <!-- Form Container -->
        <div class="auth-form-side reveal-up">
            <div class="text-center mb-5">
                <a href="index.html" class="nav-logo justify-content-center mb-4">
                <i class="bi bi-lightning-charge-fill accent-glow"></i>
                ICEPRO
            </a>
                <h3 class="mb-2">Create Pro Account</h3>
                <p class="text-secondary small">Join elite players and get exclusive pro-shop benefits.</p>
            </div>

            <form class="row g-3">
                <div class="col-md-6">
                    <label class="small text-secondary mb-2 uppercase fw-bold letter-spacing-1">First Name</label>
                    <input type="text" class="form-control" placeholder="John" required>
                </div>
                <div class="col-md-6">
                    <label class="small text-secondary mb-2 uppercase fw-bold letter-spacing-1">Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                </div>
                
                <div class="col-12">
                    <label class="small text-secondary mb-2 uppercase fw-bold letter-spacing-1">Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>
                
                <div class="col-12">
                    <label class="small text-secondary mb-2 uppercase fw-bold letter-spacing-1">Password</label>
                    <input type="password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                </div>

                <div class="col-12 mb-2">
                    <div class="d-flex align-items-start gap-2">
                        <input type="checkbox" id="terms" class="form-check-input mt-1" required>
                        <label for="terms" class="small text-secondary">I agree to the <a href="#" class="text-accent">Terms</a> and <a href="#" class="text-accent">Privacy</a></label>
                    </div>
                </div>

                <div class="col-12 text-center">
                    <button class="btn btn-primary w-100 py-3 mb-4">Create Account</button>
                    
                    <div class="social-login-grid">
                        <button class="btn btn-outline btn-sm py-2" type="button">
                            <i class="bi bi-google me-2"></i> Google
                        </button>
                        <button class="btn btn-outline btn-sm py-2" type="button">
                            <i class="bi bi-apple me-2"></i> Apple
                        </button>
                    </div>
                </div>

                <div class="col-12 text-center mt-5">
                    <p class="small text-secondary">
                        Already a member? <a href="login.html" class="text-accent fw-bold">Login here</a>
                    </p>
                </div>
            </form>
            
            <div class="mt-5 text-center">
                <p class="small text-secondary">&copy; 2026 IcePro. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
